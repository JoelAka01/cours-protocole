<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Bat Computer</title>
</head>
<body>

<h1>Bat Computer</h1>

<div id="welcome"></div>

<div id="gadgets"></div>
<script>

// Les credentials sont envoyés automatiquement par le navigateur
// car la page est déjà protégée par Basic Auth (popup native)
async function loadUser() {

    const response = await fetch("/api/me");

    const user = await response.json();

    document.getElementById("welcome").innerHTML =
        `Bienvenue, Justicier ${user.username}`;
}

loadUser();
async function loadSecrets() {

    const response = await fetch("/api/secrets");

    const data = await response.json();

    const container = document.getElementById("gadgets");

    data.forEach(gadget => {

        container.innerHTML += `
            <div>
                <h3>${gadget.name}</h3>
                <p>${gadget.desc}</p>
            </div>
        `;
    });
}

loadSecrets();

</script>

</body>
</html>
