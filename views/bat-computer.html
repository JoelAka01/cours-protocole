<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Bat Computer</title>
</head>
<body>

<h1>Bat Computer</h1>

<div id="welcome"></div>

<a href="/auth/logout">Se déconnecter</a>

<h2>Arsenal</h2>
<div id="gadgets"></div>

<script>
async function loadUser() {
    const response = await fetch("/bat-computer/api/me");
    const user = await response.json();
    document.getElementById("welcome").innerHTML =
        `Bienvenue, Justicier ${user.username}`;
}

async function loadSecrets() {
    const response = await fetch("/bat-computer/api/secrets");
    const data = await response.json();
    const container = document.getElementById("gadgets");

    data.forEach(gadget => {
        container.innerHTML += `
            <div>
                <h3>${gadget.name}</h3>
                <p>${gadget.desc}</p>
            </div>
        `;
    });
}

loadUser();
loadSecrets();
</script>

</body>
</html>
